risk:
  max_daily_loss_usd: 20          # 일일 최대 손실 ($100~$500 자본 기준)
  max_position_size_usd: 30       # 단일 포지션 최대
  max_concurrent_positions: 3     # 동시 포지션 수
  min_edge_pct: 5.0               # 최소 엣지 % (Binance 확률 vs Polymarket 확률)
  circuit_breaker_losses: 3       # 연속 N회 손실 시 중단
  min_price: 0.85                 # 메이커 오더 최소 가격 ($0.85 이상만)
  max_price: 0.97                 # 메이커 오더 최대 가격 ($0.97 이하만)

strategy:
  entry_window_seconds: 30        # 마켓 종료 전 N초부터 진입 탐색
  cancel_window_seconds: 5        # 마켓 종료 전 N초 이내 미체결 취소
  target_price_range: [0.90, 0.95]  # 메이커 오더 가격 범위
  order_size_shares: 50           # 기본 오더 사이즈
  requote_threshold_pct: 2.0      # 확률 변동 N% 이상 시 오더 재배치

monitoring:
  telegram_enabled: false
  telegram_bot_token: ""
  telegram_chat_id: ""
  log_level: "INFO"
  log_file: "logs/bot.jsonl"
